        body {
            background-image:
                linear-gradient(
                    rgba(148, 201, 251, 0.38),
                    rgba(148, 202, 251, 0.38)

            background-position: center;

        }

        .nen {

        }
        /* PHẦN NAVBAR */
        .navbar {
            border: 0px solid;
            margin-top: clamp(10px, 3vw, 30px);
            margin-right: clamp(5px, 3vw, 30px);
            margin-left: clamp(5px, 3vw, 50px);
            font-size: clamp(18px, 3vw, 34px);
        }
        .danhsach {
            margin-left: clamp(5px, 6vw, 160px);
            font-size: clamp(12px, 3vw, 24px);
        }

        .link {
            background: linear-gradient(to right, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .danhsach {
            font-size: clamp(8px, 3vw, 28px);
            font-weight: 560;
        }

        /* CHỮ H1 */
        h1 {
            text-align: center;
            font-family: "Dancing Script", cursive;
            font-size: clamp(45px, 7vw, 150px);
            color: #fff;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.5),
                0 0 20px rgba(139, 92, 246, 0.8);
            margin-bottom: 10px;
            z-index: 2;
            animation: fadeInUp 1.2s ease-out;
        }
        #duoichutieude {
            text-align: center;
            font-size: clamp(12px, 3vw, 35px);
            font-weight: 600;
            letter-spacing: 2px;
            color: white;
            text-transform: uppercase;
            margin-top: 10px;
        }
        .chutieude {
            z-index: 2;
            animation: fadeInUp 1.2s ease-out;
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 999;
        }
        .loiyeuthuong {
            display: inline-flex;
            gap: 15vw;
            margin-top: clamp(10px, 8vw, 80px);
            color: white;
        }
        .bamloiyeuthuong {
            border: solid #a78bfa;
            padding: clamp(2px, 2vw, 20px);
            border-radius: clamp(10px, 8vw, 40px);
            background-color: #a78bfa;
            display: flex;
            display: inline-block;
        }
        .linkloiyeuthuong {
            color: white;
            font-size: clamp(14px, 3vw, 40px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /*  CHỮ THƯỚC PHIM KỶ NIỆM */
        hr {
            background-color: #f3f9fb;
        }
        .thuocphimkyniem {
            margin-top: clamp(80px, 20vw, 180px);
            text-align: center;
            font-size: clamp(30px, 7vw, 80px);
            margin-bottom: 50px;
            position: relative;
            font-weight: 700;
            background: linear-gradient(to right, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .thuocphimkyniem::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(250px, 45vw, 600px);
            height: 4px;
            background: linear-gradient(to right, #8b5cf6, #ec4899);
            border-radius: 5px;
        }

        /* PHẦN ALBUM */

        /* ==========================================================================
           1. CẤU HÌNH MẶC ĐỊNH CHO ĐIỆN THOẠI (Bề ngang khối ảnh tầm 300px)
           ========================================================================== */
        .masonry-gallery {
            margin-top: clamp(200px, 10vw, 500px);
            column-count: 3; /* Trên điện thoại hiển thị 3 cột nhỏ gọn */
            column-gap: 6px; /* Khoảng cách giữa các cột */
            max-width: 450px; /* Giới hạn bề ngang trên điện thoại */
            margin: 15px auto; /* Căn giữa album ra giữa màn hình */
            padding: 6px;
            
        }

        /* Định dạng ảnh dùng chung cho cả điện thoại và máy tính */
        .masonry-gallery img {
            display: block;
            width: 100%; /* Ảnh luôn vừa khít theo cột */
            height: auto; /* Chiều cao tự động để xếp gạch giống mẫu */
            margin-bottom: 6px; /* Khoảng cách dưới của mỗi ảnh */
            border-radius: 6px; /* Bo góc ảnh */
            break-inside: avoid; /* Ngăn ảnh bị cắt đôi khi chuyển cột */
            transition: transform 0.2s ease; /* Hiệu ứng mượt mà khi di chuột */
        }

        /* ==========================================================================
           2. CẤU HÌNH TỰ ĐỘNG THAY ĐỔI KHI LÊN MÀN HÌNH MÁY TÍNH (LAPTOP / PC)
           ========================================================================== */
        @media (min-width: 769px) {
            .masonry-gallery {
                column-count: 5; /* Lên máy tính tự động tăng lên thành 5 cột to đẹp */
                column-gap: 12px; /* Khoảng cách giữa các cột rộng rãi hơn */
                max-width: 900px; /* Lên máy tính tự động nở rộng bề ngang ra 1000px */
                padding: 15px;
            }

            .masonry-gallery img {
                margin-bottom: 12px; /* Tăng khoảng cách dưới của ảnh trên máy tính */
                border-radius: 12px; /* Ảnh to hơn thì bo góc lớn hơn nhìn sẽ sang hơn */
            }

            /* Hiệu ứng phóng to nhẹ khi người dùng dùng chuột máy tính rê vào ảnh */
            .masonry-gallery img:hover {
                transform: scale(1.13);
                box-shadow: 0 4px 12px rgba(158, 50, 168, 0.9);
                cursor: pointer;
            }
        }
        /* ==========================================================================
           HIỆU ỨNG KHI NHẤN (CLICK/TOUCH) VÀO ẢNH
           ========================================================================== */

        /* Áp dụng cho cả điện thoại và máy tính */
        .masonry-gallery img:active {
            transform: scale(
                1.3
            ) !important; /* Thu nhỏ ảnh lại 5% tạo cảm giác nhấn nút */
            opacity: 0.8; /* Làm mờ ảnh đi một chút (còn 80% độ đậm) */
            transition: transform 0.1s ease; /* Tốc độ lún xuống cực nhanh để tạo độ nhạy */
            box-shadow: 0 4px 12px rgba(158, 50, 168, 0.9);
            cursor: pointer;
        }
